name: Generate daily digest

on:
  schedule:
    # 09:15 Asia/Shanghai (GitHub Actions cron uses UTC).
    - cron: "15 1 * * *"
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate, validate, and render
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
        run: |
          npm run generate
          npm run validate
          npm run build

      - name: Commit the new issue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chatgpt_output data/issues data/research
          if git diff --cached --quiet; then
            echo "No new issue to commit."
            exit 0
          fi
          git commit -m "content: publish daily digest $(date -u +%F)"
          git push
